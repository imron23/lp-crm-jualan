<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munira CRM | Lead Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: var(--bg-offset);
            padding: 40px;
        }

        .dash-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .dash-card {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-light);
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .lead-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .lead-table th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid var(--border-light);
            color: var(--text-gray);
            font-size: 0.85rem;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .lead-table td {
            padding: 15px;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .dash-card {
            overflow-x: auto;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--primary-glow);
            color: var(--primary);
        }

        .btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-lab {
            font-size: 0.85rem;
            color: var(--text-gray);
        }
    </style>
</head>

<body class="light-mode">
    <div class="dash-container">
        <header class="dash-header">
            <div>
                <a href="index.html" class="logo">
                    <i class="fas fa-mosque"></i> MUNIRA <span>CRM</span>
                </a>
                <h1 style="font-size: 1.5rem; margin-top: 10px;">Leads & Consultation Dashboard</h1>
            </div>
            <button class="btn-refresh" onclick="fetchLeads()"><i class="fas fa-sync"></i> Refresh Data</button>
        </header>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-lab">Total Leads</div>
                <div class="stat-val" id="totalLeads">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-lab">Meeting Scheduled</div>
                <div class="stat-val" id="meetingCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-lab">Total Pilgrims (Est)</div>
                <div class="stat-val" id="totalPilgrims">0</div>
            </div>
        </div>

        <div class="dash-card">
            <table class="lead-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Location</th>
                        <th>Position</th>
                        <th>Ad Spend</th>
                        <th>Pilgrims</th>
                        <th>Obstacles</th>
                        <th>Expected Features</th>
                        <th>Meeting</th>
                        <th>Agreed</th>
                        <th>WhatsApp</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="leadBody">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchLeads() {
            try {
                const res = await fetch('/api/leads');
                const data = await res.json();
                renderLeads(data);
            } catch (e) {
                console.error('Failed to fetch leads', e);
            }
        }

        function formatWA(phone) {
            let clean = phone.replace(/[^0-9]/g, '');
            if (clean.startsWith('0')) {
                clean = '62' + clean.slice(1);
            }
            return clean;
        }

        function renderLeads(leads) {
            const body = document.getElementById('leadBody');
            body.innerHTML = leads.map(l => {
                const waNumber = formatWA(l.phone);
                const agreedBadge = l.agreed
                    ? '<span class="status-badge" style="background: #d4edda; color: #155724;">Yes</span>'
                    : '<span class="status-badge" style="background: #f8d7da; color: #721c24;">No</span>';
                const statusBadge = l.agreed
                    ? '<span class="status-badge" style="background: #d4edda; color: #155724;">AGREED</span>'
                    : '<span class="status-badge">NEW LEAD</span>';
                return `
                    <tr>
                        <td>${new Date(l.createdAt).toLocaleDateString()}</td>
                        <td><strong>${l.name}</strong></td>
                        <td>${l.phone}</td>
                        <td>${l.location}</td>
                        <td>${l.position || '-'}</td>
                        <td>${l.adsBudget || '-'}</td>
                        <td>${l.pilgrimsCount || '-'}</td>
                        <td>${l.obstacles || '-'}</td>
                        <td>${l.expectedFeatures || '-'}</td>
                        <td>${l.meetingTime || '-'}</td>
                        <td>${agreedBadge}</td>
                        <td>
                            <a href="https://wa.me/${waNumber}?text=Assalamu'alaikum%20${encodeURIComponent(l.name)},%20saya%20dari%20Munira%20CRM..." 
                               target="_blank" 
                               style="color: #25D366; font-size: 1.2rem;">
                                <i class="fab fa-whatsapp"></i> Chat
                            </a>
                        </td>
                        <td>${statusBadge}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('totalLeads').innerText = leads.length;
            document.getElementById('meetingCount').innerText = leads.filter(l => l.meetingTime).length;
            document.getElementById('totalPilgrims').innerText = leads.reduce((acc, curr) => acc + (curr.pilgrimsCount || 0), 0);
        }

        fetchLeads();
    </script>
</body>

</html>
