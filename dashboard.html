<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munira CRM | Lead Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: var(--bg-offset);
            padding: 40px;
        }

        .dash-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .dash-card {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-light);
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        .lead-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .lead-table th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid var(--border-light);
            color: var(--text-gray);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .lead-table td {
            padding: 15px;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.95rem;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--primary-glow);
            color: var(--primary);
        }

        .btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-lab {
            font-size: 0.85rem;
            color: var(--text-gray);
        }
    </style>
</head>

<body class="light-mode">
    <div class="dash-container">
        <header class="dash-header">
            <div>
                <a href="index.html" class="logo">
                    <i class="fas fa-mosque"></i> MUNIRA <span>CRM</span>
                </a>
                <h1 style="font-size: 1.5rem; margin-top: 10px;">Leads & Consultation Dashboard</h1>
            </div>
            <button class="btn-refresh" onclick="fetchLeads()"><i class="fas fa-sync"></i> Refresh Data</button>
        </header>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-lab">Total Leads</div>
                <div class="stat-val" id="totalLeads">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-lab">Meeting Scheduled</div>
                <div class="stat-val" id="meetingCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-lab">Total Pilgrims (Est)</div>
                <div class="stat-val" id="totalPilgrims">0</div>
            </div>
        </div>

        <div class="dash-card">
            <table class="lead-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Location</th>
                        <th>Ad Spend</th>
                        <th>Meeting</th>
                        <th>WhatsApp</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="leadBody">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Login Overlay -->
    <div id="loginOverlay"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-offset); display: flex; align-items: center; justify-content: center; z-index: 10000; display: none;">
        <div class="dash-card" style="width: 100%; max-width: 400px; text-align: center;">
            <i class="fas fa-lock" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>Admin Login</h2>
            <p style="color: var(--text-gray); margin-bottom: 30px;">Please enter your credentials to access the
                dashboard.</p>
            <form id="loginForm" style="display: grid; gap: 15px;">
                <input type="text" id="username" placeholder="Username" required
                    style="padding: 15px; border-radius: 12px; border: 1px solid var(--border-light); background: white;">
                <input type="password" id="password" placeholder="Password" required
                    style="padding: 15px; border-radius: 12px; border: 1px solid var(--border-light); background: white;">
                <button type="submit" class="btn-refresh" style="padding: 15px;">Login Access</button>
            </form>
            <div id="loginError" style="color: #ff3b30; margin-top: 15px; font-size: 0.9rem; display: none;">Invalid
                username or password</div>
        </div>
    </div>

    <script>
        const tokenKey = 'munira_token';

        async function fetchLeads() {
            const token = localStorage.getItem(tokenKey);
            if (!token) {
                showLogin();
                return;
            }

            try {
                const res = await fetch('/api/leads', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem(tokenKey);
                    showLogin();
                    return;
                }

                const data = await res.json();
                renderLeads(data);
            } catch (e) {
                console.error('Failed to fetch leads', e);
            }
        }

        function showLogin() {
            document.getElementById('loginOverlay').style.display = 'flex';
        }

        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem(tokenKey, data.token);
                    document.getElementById('loginOverlay').style.display = 'none';
                    fetchLeads();
                } else {
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.style.display = 'block';
                errorEl.innerText = 'Server error. Please try again.';
            }
        });

        function formatWA(phone) {
            let clean = phone.replace(/[^0-9]/g, '');
            if (clean.startsWith('0')) {
                clean = '62' + clean.slice(1);
            }
            return clean;
        }

        function renderLeads(leads) {
            const body = document.getElementById('leadBody');
            body.innerHTML = leads.map(l => {
                const waNumber = formatWA(l.phone);
                return `
                    <tr>
                        <td>${new Date(l.createdAt).toLocaleDateString()}</td>
                        <td><strong>${l.name}</strong></td>
                        <td>${l.phone}</td>
                        <td>${l.location}</td>
                        <td>${l.adsBudget || '-'}</td>
                        <td>${l.meetingTime || '-'}</td>
                        <td>
                            <a href="https://wa.me/${waNumber}?text=Assalamu'alaikum%20${encodeURIComponent(l.name)},%20saya%20dari%20Munira%20CRM..." 
                               target="_blank" 
                               style="color: #25D366; font-size: 1.2rem;">
                                <i class="fab fa-whatsapp"></i> Chat
                            </a>
                        </td>
                        <td><span class="status-badge">NEW LEAD</span></td>
                    </tr>
                `;
            }).join('');

            document.getElementById('totalLeads').innerText = leads.length;
            document.getElementById('meetingCount').innerText = leads.filter(l => l.meetingTime).length;
            document.getElementById('totalPilgrims').innerText = leads.reduce((acc, curr) => acc + (curr.pilgrimsCount || 0), 0);
        }

        fetchLeads();
    </script>
</body>

</html>
